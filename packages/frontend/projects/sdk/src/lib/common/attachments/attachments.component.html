@if (attachments?.length > 0) {
  <banta-lightbox #lightbox></banta-lightbox>
  <div class="block-attachments">
    @for (attachment of blockAttachments; track attachmentId($index, attachment)) {
      <banta-attachment
        [attachment]="attachment"
        [editing]="editing"
        (loaded)="markAttachmentLoaded(attachment)"
        (removed)="removeAttachment(attachment)"
        (activated)="showLightbox(attachment)"
      ></banta-attachment>
    }
  </div>
  @if (attachments && attachments?.length > 0) {
    <div
      class="inline-attachments"
      [class.single]="attachments?.length === 1"
      >
      @for (attachment of inlineAttachments; track attachmentId($index, attachment)) {
        <banta-attachment
          [attachment]="attachment"
          [editing]="editing"
          (loaded)="markAttachmentLoaded(attachment)"
          (removed)="removeAttachment(attachment)"
          (activated)="showLightbox(attachment)"
        ></banta-attachment>
      }
    </div>
  }
}
